- name: Test that we have an ACI MultiSite host, username and password
  ansible.builtin.fail:
    msg: 'Please define the following variables: mso_hostname, mso_username and mso_password.'
  when: mso_hostname is not defined or mso_username is not defined or mso_password is not defined

# CLEAN ENVIRONMENT
- name: Set vars
  ansible.builtin.set_fact:
    mso_info: &mso_info
      host: '{{ mso_hostname }}'
      username: '{{ mso_username }}'
      password: '{{ mso_password }}'
      validate_certs: '{{ mso_validate_certs | default(false) }}'
      use_ssl: '{{ mso_use_ssl | default(true) }}'
      use_proxy: '{{ mso_use_proxy | default(true) }}'
      output_level: '{{ mso_output_level | default("info") }}'

# QUERY VERSION
- name: Query MSO version
  cisco.mso.mso_version:
    <<: *mso_info
    state: query
  register: version


- name: Execute tasks only for MSO version > 4.3
  when: version.current.version is version('4.3', '>=')
  block:

    - name: Ensure sites exists
      cisco.mso.mso_site:
        <<: *mso_info
        site: '{{ item.site }}'
        apic_username: '{{ apic_username }}'
        apic_password: '{{ apic_password }}'
        apic_site_id: '{{ item.apic_site_id }}'
        urls:
          - https://{{ apic_hostname }}
        state: present
      loop:
        - {site: "ansible_test", apic_site_id: 101}
        - {site: "ansible_test_2", apic_site_id: 102}

    - name: Ensure tenants exist
      cisco.mso.mso_tenant: 
        <<: *mso_info
        tenant: '{{ item }}'
        users:
          - '{{ mso_username }}'
        sites:
          - '{{ mso_site | default("ansible_test") }}'
          - ansible_test_2
        state: present
      loop:
        - ansible_test

    - name: Ensure templates do not exist
      cisco.mso.ndo_template: &template_absent
        <<: *mso_info
        name: ansible_tenant_template
        template_type: tenant
        tenant: ansible_test
        state: absent

    - name: Ensure templates exist
      cisco.mso.ndo_template:
        <<: *template_absent
        state: present

    - name: Ensure Route Map Policy for Multicast does not exist
      cisco.mso.ndo_tenant_route_map_policy_for_multicast: &route_map_policy_for_multicast_absent
        <<: *mso_info
        template: ansible_tenant_template
        name: ansible_route_map_policy_for_multicast
        state: absent

    # CREATE
    - name: Create a new Route Map Policy for Multicast (check_mode)
      cisco.mso.ndo_tenant_route_map_policy_for_multicast: &route_map_policy_for_multicast_present
        <<: *mso_info
        template: ansible_tenant_template
        name: ansible_test_route_map_policy_for_multicast
        route_map_for_multicast_entries:
        - action: permit
          order: 1
          group_ip: "226.2.2.2/8"
          source_ip: "1.1.1.1/1"
        state: present
      check_mode: true
      register: cm_create_new_route_map_policy_for_multicast

    - name: Create a new Route Map Policy for Multicast
      cisco.mso.ndo_tenant_route_map_policy_for_multicast:
        <<: *route_map_policy_for_multicast_present
        state: present
      register: nm_create_new_route_map_policy_for_multicast

    - name: Create a new Route Map Policy for Multicast again
      cisco.mso.ndo_tenant_route_map_policy_for_multicast:
        <<: *route_map_policy_for_multicast_present
        state: present
      register: nm_create_new_route_map_policy_for_multicast_again

    - name: Assert Route Map Policy for Multicast was created
      assert:
        that:
          - cm_create_new_route_map_policy_for_multicast is changed
          - cm_create_new_route_map_policy_for_multicast.previous == {}
          - cm_create_new_route_map_policy_for_multicast.current.name == 'ansible_test_route_map_policy_for_multicast'
          - nm_create_new_route_map_policy_for_multicast is changed
          - nm_create_new_route_map_policy_for_multicast.previous == {}
          - nm_create_new_route_map_policy_for_multicast.current.name == 'ansible_test_route_map_policy_for_multicast'
          - nm_create_new_route_map_policy_for_multicast_again is not changed

